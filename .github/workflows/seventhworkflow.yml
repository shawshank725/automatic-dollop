name: Runner types Seventh workflow

on: 
  workflow_dispatch: 


jobs:
  ubuntu-github-hosted-runner:
    name: Ubuntu 24.04 VM
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Running on ubuntu 24.04"

  windows-github-hosted-runner:
    name: Windows VM
    runs-on: windows-latest
    steps:
      - run: echo "Windows VM is being used."

  macos-github-hosted-runner:
    name: Mac VM
    runs-on: macos-latest
    steps:
      - run: echo "MacOS VM is being used."

  ubuntu-github-hosted-runner-different-container:
    name: Ubuntu in Alpine container
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    steps:
      - run: echo "Using ubuntu on alpine container."

  
  
